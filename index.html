<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Trove</title>
<meta name="description" content="Trove — your personal life management app." />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#5b6cff" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0b0b10" media="(prefers-color-scheme: dark)" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Trove" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" href="icon-192.png" />
<style>
:root{
  --accent:#5b6cff;
  --bg:#f5f5f7;
  --bg-elev:#ffffff;
  --card:#ffffff;
  --text:#1c1c1e;
  --text-2:#6e6e73;
  --text-3:#a1a1a8;
  --border:rgba(0,0,0,.08);
  --border-strong:rgba(0,0,0,.14);
  --shadow:0 1px 3px rgba(0,0,0,.04);
  --tab-bg:rgba(255,255,255,.82);
  --input-bg:#f0f0f3;
  --green:#34c759; --red:#ff3b30; --amber:#ff9f0a; --blue:#0a84ff;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0b0b10;
    --bg-elev:#16161c;
    --card:#16161c;
    --text:#f2f2f7;
    --text-2:#9e9ea7;
    --text-3:#6c6c75;
    --border:rgba(255,255,255,.09);
    --border-strong:rgba(255,255,255,.16);
    --shadow:none;
    --tab-bg:rgba(20,20,26,.82);
    --input-bg:#23232b;
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
  font-size:16px;
  line-height:1.4;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;font-size:16px;}
a{color:var(--accent);text-decoration:none;}

/* Layout */
#app{max-width:560px;margin:0 auto;min-height:100%;}
.screen{display:none;padding:calc(var(--safe-top) + 12px) 16px 120px;animation:fade .28s ease;}
.screen.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

.app-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;gap:12px;}
.app-header h1{font-size:30px;font-weight:800;letter-spacing:-.5px;margin:0;}
.app-header .sub{color:var(--text-2);font-size:14px;margin-top:2px;}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow);}
.card h3{margin:0 0 12px;font-size:17px;font-weight:700;letter-spacing:-.2px;}
.card .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.card .card-head h3{margin:0;}
.muted{color:var(--text-2);}
.tiny{font-size:13px;}
.row{display:flex;align-items:center;gap:10px;}
.between{justify-content:space-between;}
.wrap{flex-wrap:wrap;}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--accent);color:#fff;border-radius:12px;padding:11px 16px;font-weight:600;font-size:15px;transition:transform .08s ease,opacity .15s;}
.btn:active{transform:scale(.97);}
.btn.block{width:100%;}
.btn.secondary{background:var(--input-bg);color:var(--text);}
.btn.ghost{background:transparent;color:var(--accent);padding:8px 10px;}
.btn.danger{background:var(--red);}
.btn.sm{padding:7px 12px;font-size:13px;border-radius:10px;}
.icon-btn{width:34px;height:34px;border-radius:10px;background:var(--input-bg);display:inline-flex;align-items:center;justify-content:center;font-size:18px;transition:transform .08s;}
.icon-btn:active{transform:scale(.92);}
.chip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:999px;background:var(--input-bg);font-size:13px;font-weight:600;color:var(--text-2);transition:transform .08s;}
.chip:active{transform:scale(.95);}
.chip.on{background:var(--accent);color:#fff;}

/* Segmented control */
.seg{display:flex;background:var(--input-bg);border-radius:11px;padding:3px;gap:3px;margin-bottom:14px;}
.seg button{flex:1;padding:8px;border-radius:9px;font-size:13px;font-weight:600;color:var(--text-2);transition:.15s;}
.seg button.on{background:var(--card);color:var(--text);box-shadow:var(--shadow);}

/* Forms */
.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:6px;}
.field input,.field select,.field textarea{
  width:100%;background:var(--input-bg);border:1px solid transparent;border-radius:12px;
  padding:12px 14px;color:var(--text);outline:none;transition:border .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field textarea{resize:vertical;min-height:90px;}
.field-2{display:flex;gap:10px;}
.field-2>.field{flex:1;}

/* Progress */
.bar{height:8px;background:var(--input-bg);border-radius:999px;overflow:hidden;}
.bar>span{display:block;height:100%;background:var(--accent);border-radius:999px;transition:width .4s ease;}

/* List rows */
.list-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);}
.list-row:last-child{border-bottom:none;}
.list-row .ttl{font-weight:600;}
.dot{width:10px;height:10px;border-radius:50%;flex:none;}
.pill{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.3px;}
.badge{font-size:12px;font-weight:600;padding:2px 8px;border-radius:7px;background:var(--input-bg);color:var(--text-2);}

/* Checkbox */
.check{width:24px;height:24px;border-radius:8px;border:2px solid var(--border-strong);flex:none;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:14px;transition:.15s;}
.check.on{background:var(--green);border-color:var(--green);}

/* Empty state */
.empty{text-align:center;padding:34px 18px;color:var(--text-2);}
.empty .emoji{font-size:42px;margin-bottom:10px;}
.empty p{margin:0 0 16px;font-size:15px;}

/* Tab bar */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:60;
  display:flex;justify-content:space-around;align-items:flex-start;
  padding:8px 4px calc(var(--safe-bottom) + 6px);
  background:var(--tab-bg);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid var(--border);
  max-width:560px;margin:0 auto;
}
.tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text-3);font-size:10px;font-weight:600;padding:2px;transition:transform .08s;}
.tabbar button .ic{font-size:21px;line-height:1;}
.tabbar button.on{color:var(--accent);}
.tabbar button:active{transform:scale(.9);}

/* FAB */
.fab{
  position:fixed;z-index:55;right:max(18px,calc(50% - 280px + 18px));bottom:calc(var(--safe-bottom) + 78px);
  width:58px;height:58px;border-radius:50%;background:var(--accent);color:#fff;font-size:30px;font-weight:300;
  display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(91,108,255,.45);
  transition:transform .1s;
}
.fab:active{transform:scale(.9);}

/* Sheet / modal */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;opacity:0;transition:opacity .25s;display:flex;align-items:flex-end;justify-content:center;}
.sheet-overlay.open{opacity:1;}
.sheet{
  background:var(--bg-elev);width:100%;max-width:560px;border-radius:22px 22px 0 0;
  max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:8px 18px calc(var(--safe-bottom) + 22px);
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);
}
.sheet-overlay.open .sheet{transform:translateY(0);}
.sheet-grip{width:38px;height:5px;border-radius:3px;background:var(--border-strong);margin:8px auto 6px;}
.sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sheet-head h2{font-size:20px;font-weight:800;margin:0;letter-spacing:-.3px;}
.sheet-close{font-size:15px;color:var(--accent);font-weight:600;}

/* Color picker */
.colors{display:flex;gap:10px;flex-wrap:wrap;}
.colors button{width:34px;height:34px;border-radius:50%;border:3px solid transparent;transition:transform .1s;}
.colors button.on{border-color:var(--text);transform:scale(1.1);}
.colors button:active{transform:scale(.9);}

/* Icon picker */
.iconpick{display:flex;gap:8px;flex-wrap:wrap;}
.iconpick button{width:44px;height:44px;border-radius:12px;background:var(--input-bg);font-size:22px;display:flex;align-items:center;justify-content:center;}
.iconpick button.on{background:var(--accent);}

/* Rings */
.ring-wrap{display:flex;align-items:center;gap:16px;}
.ring{transform:rotate(-90deg);}
.ring circle{fill:none;stroke-width:9;stroke-linecap:round;}

/* Stat */
.stat{flex:1;text-align:center;}
.stat .n{font-size:24px;font-weight:800;letter-spacing:-.5px;}
.stat .l{font-size:12px;color:var(--text-2);margin-top:2px;}

/* Heatmap */
.heat{display:grid;grid-template-rows:repeat(7,1fr);grid-auto-flow:column;gap:3px;}
.heat i{width:11px;height:11px;border-radius:3px;background:var(--input-bg);display:block;}

/* Star rating */
.stars{display:flex;gap:6px;font-size:26px;}
.stars span{color:var(--text-3);cursor:pointer;}
.stars span.on{color:var(--amber);}

/* Water glasses */
.glasses{display:flex;gap:8px;flex-wrap:wrap;}
.glass{width:30px;height:38px;border:2px solid var(--border-strong);border-radius:5px 5px 9px 9px;position:relative;overflow:hidden;}
.glass.full{border-color:var(--blue);}
.glass.full:after{content:"";position:absolute;inset:0;background:var(--blue);opacity:.85;}

/* Mood scale */
.scale{display:flex;gap:8px;justify-content:space-between;}
.scale button{flex:1;aspect-ratio:1;border-radius:12px;background:var(--input-bg);font-size:22px;display:flex;align-items:center;justify-content:center;transition:transform .08s;}
.scale button.on{background:var(--accent);transform:scale(1.04);}
.scale button:active{transform:scale(.92);}

/* Timeline */
.tl-block{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.tl-time{font-size:13px;font-weight:700;color:var(--text-2);width:54px;flex:none;}
.tl-bar{width:4px;border-radius:3px;flex:none;}

/* Swipe row */
.swipe{position:relative;overflow:hidden;border-bottom:1px solid var(--border);}
.swipe:last-child{border-bottom:none;}
.swipe-del{position:absolute;right:0;top:0;bottom:0;width:84px;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;}
.swipe-content{position:relative;background:var(--card);display:flex;align-items:center;gap:12px;padding:13px 2px;transition:transform .2s ease;will-change:transform;}

/* chart */
svg.chart{width:100%;display:block;overflow:visible;}
.chart-bar{fill:var(--accent);transition:.3s;}
.chart-axis{font-size:9px;fill:var(--text-3);}

hr.div{border:none;border-top:1px solid var(--border);margin:14px 0;}
.section-title{font-size:13px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px;margin:18px 2px 8px;}
.tap{transition:transform .08s;}
.tap:active{transform:scale(.985);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.toast{position:fixed;left:50%;bottom:calc(var(--safe-bottom) + 90px);transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:11px 18px;border-radius:12px;font-size:14px;font-weight:600;opacity:0;transition:.3s;z-index:200;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">
  <section id="screen-today" class="screen active"></section>
  <section id="screen-ventures" class="screen"></section>
  <section id="screen-goals" class="screen"></section>
  <section id="screen-fitness" class="screen"></section>
  <section id="screen-habits" class="screen"></section>
  <section id="screen-me" class="screen"></section>
</div>

<button class="fab" id="fab" aria-label="Quick add">+</button>

<nav class="tabbar" id="tabbar">
  <button data-tab="today" class="on"><span class="ic">🏠</span>Today</button>
  <button data-tab="ventures"><span class="ic">🚀</span>Ventures</button>
  <button data-tab="goals"><span class="ic">🎯</span>Goals</button>
  <button data-tab="fitness"><span class="ic">💪</span>Fitness</button>
  <button data-tab="habits"><span class="ic">🔥</span>Habits</button>
  <button data-tab="me"><span class="ic">🧘</span>Me</button>
</nav>

<div class="sheet-overlay" id="sheet-overlay">
  <div class="sheet" id="sheet">
    <div class="sheet-grip"></div>
    <div class="sheet-head">
      <h2 id="sheet-title"></h2>
      <button class="sheet-close" id="sheet-close">Done</button>
    </div>
    <div id="sheet-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   Trove — vanilla PWA. All persistence via localStorage.
   ============================================================ */
"use strict";

/* ---------- helpers ---------- */
const $  = (s,el=document)=>el.querySelector(s);
const $$ = (s,el=document)=>[...el.querySelectorAll(s)];
const uid = ()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const todayStr = ()=>new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD local
const esc = s => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const clamp = (n,a,b)=>Math.max(a,Math.min(b,n));
const COLORS = ['#5b6cff','#ff375f','#ff9f0a','#34c759','#5ac8fa','#bf5af2','#ff6482','#30d158'];
const HABIT_ICONS = ['💧','🏃','🧘','📚','💪','🛏️','🥗','🧠','☀️','✍️','🚭','💊','🎯','🙏','🎸'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const DB = {
  get(k,def){ try{ const v=localStorage.getItem(k); return v==null?def:JSON.parse(v);}catch(e){return def;} },
  set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){ toast('Storage full'); } }
};

const KEYS=['user','ventures','goals','workouts','metrics','prs','fitgoals','habits','routine','sleep','journal','daily'];
const DEFAULTS={
  user:{name:'Manu',weightUnit:'kg',sleepGoal:8,waterGoal:8},
  ventures:[],goals:[],workouts:[],metrics:[],prs:[],fitgoals:[],
  habits:[],routine:[],sleep:[],journal:[],daily:[]
};
const S={};
KEYS.forEach(k=>S[k]=DB.get('trove_'+k,JSON.parse(JSON.stringify(DEFAULTS[k]))));
function save(k){ DB.set('trove_'+k,S[k]); }

/* daily record for a date */
function dayRec(date=todayStr()){
  let r=S.daily.find(d=>d.date===date);
  if(!r){ r={date,mood:null,energy:null,water:0,focusTasks:[]}; S.daily.push(r); }
  return r;
}

/* ---------- toast ---------- */
let toastT;
function toast(msg){
  const el=$('#toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),1800);
}

/* ---------- sheet (modal) ---------- */
function openSheet(title,html,onMount){
  $('#sheet-title').textContent=title;
  $('#sheet-body').innerHTML=html;
  $('#sheet-overlay').classList.add('open');
  document.body.style.overflow='hidden';
  if(onMount) onMount($('#sheet-body'));
}
function closeSheet(){
  $('#sheet-overlay').classList.remove('open');
  document.body.style.overflow='';
}
$('#sheet-close').onclick=closeSheet;
$('#sheet-overlay').addEventListener('click',e=>{ if(e.target.id==='sheet-overlay') closeSheet(); });

/* ---------- tabs ---------- */
let activeTab='today';
function switchTab(tab){
  activeTab=tab;
  $$('.screen').forEach(s=>s.classList.remove('active'));
  $('#screen-'+tab).classList.add('active');
  $$('#tabbar button').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  window.scrollTo(0,0);
  renderTab(tab);
}
$('#tabbar').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(b) switchTab(b.dataset.tab);
});

function renderTab(tab){
  ({today:renderToday,ventures:renderVentures,goals:renderGoals,
    fitness:renderFitness,habits:renderHabits,me:renderMe}[tab])();
}

/* ---------- shared UI bits ---------- */
function colorPicker(sel){
  return `<div class="field"><label>Color</label><div class="colors" data-colors>
    ${COLORS.map(c=>`<button type="button" data-c="${c}" class="${c===sel?'on':''}" style="background:${c}"></button>`).join('')}
  </div></div>`;
}
function bindColors(root){
  const wrap=$('[data-colors]',root); if(!wrap) return;
  wrap.addEventListener('click',e=>{
    const b=e.target.closest('button[data-c]'); if(!b) return;
    $$('button',wrap).forEach(x=>x.classList.remove('on')); b.classList.add('on');
  });
}
function pickedColor(root){ const b=$('[data-colors] button.on',root); return b?b.dataset.c:COLORS[0]; }

function emptyState(emoji,text,btnLabel,onClick){
  const id='e'+uid();
  setTimeout(()=>{ const b=document.getElementById(id); if(b&&onClick) b.onclick=onClick; });
  return `<div class="empty"><div class="emoji">${emoji}</div><p>${esc(text)}</p>
    ${btnLabel?`<button class="btn" id="${id}">${esc(btnLabel)}</button>`:''}</div>`;
}

/* progress ring svg */
function ring(pct,size=64,color='var(--accent)'){
  const r=(size-9)/2, c=2*Math.PI*r, off=c*(1-clamp(pct,0,1));
  return `<svg class="ring" width="${size}" height="${size}">
    <circle r="${r}" cx="${size/2}" cy="${size/2}" stroke="var(--input-bg)"></circle>
    <circle r="${r}" cx="${size/2}" cy="${size/2}" stroke="${color}" stroke-dasharray="${c}" stroke-dashoffset="${off}"></circle>
  </svg>`;
}

/* simple bar chart */
function barChart(values,labels,opt={}){
  const w=opt.w||300,h=opt.h||110,pad=18,bw=(w-pad)/values.length;
  const max=Math.max(1,...values,opt.min||0);
  const color=opt.color||'var(--accent)';
  let bars='',axis='';
  values.forEach((v,i)=>{
    const bh=Math.max(2,(v/max)*(h-26));
    const x=pad/2+i*bw, y=h-22-bh;
    bars+=`<rect class="chart-bar" x="${x+bw*0.15}" y="${y}" width="${bw*0.7}" height="${bh}" rx="3" fill="${color}"></rect>`;
    if(v>0) axis+=`<text class="chart-axis" x="${x+bw/2}" y="${y-3}" text-anchor="middle">${v}</text>`;
    axis+=`<text class="chart-axis" x="${x+bw/2}" y="${h-7}" text-anchor="middle">${esc(labels[i]||'')}</text>`;
  });
  return `<svg class="chart" viewBox="0 0 ${w} ${h}">${bars}${axis}</svg>`;
}
/* simple line chart */
function lineChart(points,opt={}){ // points: [{x:label, y:number}]
  const w=opt.w||320,h=opt.h||130,padL=8,padR=8,padT=12,padB=20;
  if(points.length===0) return '<div class="muted tiny">No data yet.</div>';
  const ys=points.map(p=>p.y);
  let min=Math.min(...ys),max=Math.max(...ys); if(min===max){min-=1;max+=1;}
  const sx=(i)=>padL+(i/(Math.max(1,points.length-1)))*(w-padL-padR);
  const sy=(v)=>padT+(1-(v-min)/(max-min))*(h-padT-padB);
  let d='',dots='';
  points.forEach((p,i)=>{ const x=sx(i),y=sy(p.y); d+=(i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1)+' '; dots+=`<circle cx="${x}" cy="${y}" r="2.6" fill="var(--accent)"/>`; });
  const labels=points.map((p,i)=> (i===0||i===points.length-1||points.length<=6) ? `<text class="chart-axis" x="${sx(i)}" y="${h-5}" text-anchor="${i===0?'start':i===points.length-1?'end':'middle'}">${esc(p.x)}</text>`:'').join('');
  return `<svg class="chart" viewBox="0 0 ${w} ${h}">
    <path d="${d}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    <text class="chart-axis" x="${padL}" y="${sy(max)-3}">${max.toFixed(1)}</text>
    <text class="chart-axis" x="${padL}" y="${sy(min)+9}">${min.toFixed(1)}</text>
    ${labels}
  </svg>`;
}

/* date utilities */
function daysAgo(n){ const d=new Date(); d.setDate(d.getDate()-n); return d.toLocaleDateString('en-CA'); }
function fmtDate(s){ if(!s) return ''; const d=new Date(s+'T00:00:00'); return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}); }
function fmtDateY(s){ if(!s) return ''; const d=new Date(s+'T00:00:00'); return d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }

/* ============================================================
   1. TODAY
   ============================================================ */
function renderToday(){
  const el=$('#screen-today');
  const h=new Date().getHours();
  const greet = h<12?'Good morning':h<18?'Good afternoon':'Good evening';

  const streak=computeDayStreak();

        </div>

      </div>

    <h3>How are you feeling?</h3>
    <div class="tiny muted" style="margin-bottom:6px">Mood</div>
    <div class="scale" data-mood>${[1,2,3,4,5].map(n=>`<button data-v="${n}" class="${rec.mood===n?'on':''}">${['😞','😕','😐','🙂','😄'][n-1]}</button>`).join('')}</div>
    <div class="tiny muted" style="margin:12px 0 6px">Energy</div>
    <div class="scale" data-energy>${[1,2,3,4,5].map(n=>`<button data-v="${n}" class="${rec.energy===n?'on':''}">${'⚡'.repeat(1)}<small style="font-size:11px">${n}</small></button>`).join('')}</div>
  </div>

    </div>

  // events
  $$('[data-focus]',el).forEach(r=>r.onclick=()=>{ toggleFocus(r.dataset.focus); });
  $('[data-mood]',el).addEventListener('click',e=>{const b=e.target.closest('button[data-v]');if(b){rec.mood=+b.dataset.v;save('daily');renderToday();}});
  $('[data-energy]',el).addEventListener('click',e=>{const b=e.target.closest('button[data-v]');if(b){rec.energy=+b.dataset.v;save('daily');renderToday();}});
  $('#water-add',el).onclick=()=>{rec.water++;save('daily');renderToday();};
  $('#water-rm',el).onclick=()=>{rec.water=Math.max(0,rec.water-1);save('daily');renderToday();};
}

function computeDayStreak(){
  // consecutive days (ending today) with any activity logged
  const active=new Set();
  S.daily.forEach(d=>{ if(d.mood||d.energy||d.water>0||d.focusTasks?.length) active.add(d.date); });
  S.habits.forEach(hb=>(hb.logs||[]).forEach(l=>active.add(l)));
  S.workouts.forEach(w=>active.add(w.date));
  S.journal.forEach(j=>active.add(j.date));
  let streak=0,d=new Date();
  while(active.has(d.toLocaleDateString('en-CA'))){ streak++; d.setDate(d.getDate()-1); }
  return streak;
}

function getFocusTasks(){
  const out=[];
  S.ventures.filter(v=>v.status==='active').forEach(v=>{
    (v.objectives||[]).filter(o=>o.status!=='done').forEach(o=>{
      out.push({id:'v:'+v.id+':'+o.id,title:o.title,from:v.name,done:false,prio:o.priority});
    });
  });
  S.goals.filter(g=>g.status==='active').forEach(g=>{
    (g.milestones||[]).filter(m=>!m.done).forEach(m=>{
      out.push({id:'g:'+g.id+':'+m.id,title:m.title,from:g.title,done:false,prio:'med'});
    });
  });
  const rank={high:0,med:1,low:2};
  out.sort((a,b)=>(rank[a.prio]??1)-(rank[b.prio]??1));
  // reflect done state from completedToday store in daily rec
  const rec=dayRec();
  out.forEach(o=>{ o.done=rec.focusTasks?.includes(o.id); });
  return out.slice(0,3);
}
function toggleFocus(id){
  const rec=dayRec();
  rec.focusTasks=rec.focusTasks||[];
  const i=rec.focusTasks.indexOf(id);
  if(i>=0) rec.focusTasks.splice(i,1); else rec.focusTasks.push(id);
  // also mark underlying objective/milestone done when checked
  const [type,oid,iid]=id.split(':');
  if(type==='v'){ const v=S.ventures.find(x=>x.id===oid); const o=v?.objectives.find(x=>x.id===iid); if(o){o.status=(i<0)?'done':'pending'; v.lastActivity=todayStr(); save('ventures');} }
  if(type==='g'){ const g=S.goals.find(x=>x.id===oid); const m=g?.milestones.find(x=>x.id===iid); if(m){m.done=(i<0); save('goals');} }
  save('daily'); renderToday();
}

/* generic swipe-to-delete */
function enableSwipe(swipeEl,onDelete){
  const content=$('.swipe-content',swipeEl);
  let startX=0,cur=0,dragging=false,open=false;
  const W=84;
  content.addEventListener('touchstart',e=>{ startX=e.touches[0].clientX; dragging=true; content.style.transition='none'; },{passive:true});
  content.addEventListener('touchmove',e=>{ if(!dragging)return; let dx=e.touches[0].clientX-startX+(open?-W:0); cur=clamp(dx,-W,0); content.style.transform=`translateX(${cur}px)`; },{passive:true});
  content.addEventListener('touchend',()=>{ dragging=false; content.style.transition='transform .2s ease'; open=cur<-W/2; content.style.transform=`translateX(${open?-W:0}px)`; });
  $('.swipe-del',swipeEl).onclick=()=>onDelete();
}

   5. HABITS
   ============================================================ */
function habitsForToday(){
  const dow=new Date().getDay();
  return S.habits.filter(h=>h.frequency==='daily' || (Array.isArray(h.days)&&h.days.includes(dow)));
}
function habitDoneOn(h,date){ return (h.logs||[]).includes(date); }
function habitStreak(h){
  let cur=0,d=new Date();
  while(habitDoneOn(h,d.toLocaleDateString('en-CA'))){ cur++; d.setDate(d.getDate()-1); }
  // longest
  const set=new Set(h.logs||[]); let longest=0;
  (h.logs||[]).forEach(l=>{ let n=0,dd=new Date(l+'T00:00:00'); while(set.has(dd.toLocaleDateString('en-CA'))){n++;dd.setDate(dd.getDate()-1);} longest=Math.max(longest,n); });
  return {cur,longest};
}
function renderHabits(){
  const el=$('#screen-habits');
  el.innerHTML=`<div class="app-header"><div><h1>Habits</h1><div class="sub">${S.habits.length} habit${S.habits.length!==1?'s':''}</div></div>
    <button class="icon-btn" id="add-habit">+</button></div>
  ${S.habits.length? S.habits.map(habitCard).join('')
    : emptyState('🔥','Build better habits. Start small, stay consistent.','Create habit',()=>habitForm())}`;
  $('#add-habit',el).onclick=()=>habitForm();
  $$('[data-habit]',el).forEach(card=>{
    const h=S.habits.find(x=>x.id===card.dataset.habit);
    $('[data-toggle]',card).onclick=(e)=>{ e.stopPropagation(); toggleHabit(h); };
    $('[data-edit]',card).onclick=(e)=>{ e.stopPropagation(); habitForm(h); };
  });
}
function toggleHabit(h){
  const t=todayStr(); h.logs=h.logs||[];
  const i=h.logs.indexOf(t); if(i>=0)h.logs.splice(i,1); else h.logs.push(t);
  save('habits'); renderHabits();
}
function habitCard(h){
  const t=todayStr(), done=habitDoneOn(h,t);
  const {cur,longest}=habitStreak(h);
  const active=h.frequency==='daily'||h.days?.includes(new Date().getDay());
  // weekly rate
  let wk=0; for(let i=0;i<7;i++){ if(habitDoneOn(h,daysAgo(i)))wk++; }
  // heatmap last ~91 days
  let cells='';
  for(let i=90;i>=0;i--){ const d=daysAgo(i); const on=habitDoneOn(h,d); cells+=`<i title="${d}" style="${on?`background:${h.color}`:''}"></i>`; }
  return `<div class="card" data-habit="${h.id}">
    <div class="row between">
      <div class="row" style="gap:10px"><span style="font-size:24px">${h.icon}</span>
        <div><div class="ttl">${esc(h.name)}</div><div class="tiny muted">${esc(h.category)} · ${h.frequency==='daily'?'daily':h.days.map(d=>DAYS[d]).join(' ')}</div></div></div>
      <button class="check ${done?'on':''}" data-toggle ${!active?'style="opacity:.4"':''}>${done?'✓':''}</button>
    </div>
    <div class="row" style="gap:18px;margin:12px 0">
      <div class="stat"><div class="n" style="color:${h.color}">${cur}🔥</div><div class="l">current</div></div>
      <div class="stat"><div class="n">${longest}</div><div class="l">longest</div></div>
      <div class="stat"><div class="n">${Math.round(wk/7*100)}%</div><div class="l">this week</div></div>
    </div>
    <div class="heat">${cells}</div>
    <button class="btn ghost sm" data-edit style="margin-top:8px;padding:4px 0">Edit</button>
  </div>`;
}
function habitForm(existing){
  const h=existing||{frequency:'daily',days:[1,2,3,4,5],icon:HABIT_ICONS[0],color:COLORS[0]};
  openSheet(existing?'Edit habit':'New habit',`
    <div class="field"><label>Name</label><input id="h-name" value="${esc(h.name||'')}" placeholder="e.g. Drink water"></div>
    <div class="field"><label>Icon</label><div class="iconpick" data-icons>${HABIT_ICONS.map(ic=>`<button type="button" data-ic="${ic}" class="${ic===h.icon?'on':''}">${ic}</button>`).join('')}</div></div>
    <div class="field"><label>Category</label><select id="h-cat">${['health','fitness','mindset','work','social','other'].map(c=>`<option ${h.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
    <div class="field"><label>Frequency</label><select id="h-freq"><option value="daily" ${h.frequency==='daily'?'selected':''}>Every day</option><option value="custom" ${h.frequency!=='daily'?'selected':''}>Specific days</option></select></div>
    <div class="field" id="days-field" style="${h.frequency==='daily'?'display:none':''}"><label>Days</label><div class="row wrap" data-days>${DAYS.map((d,i)=>`<button type="button" class="chip ${(h.days||[]).includes(i)?'on':''}" data-day="${i}">${d}</button>`).join('')}</div></div>
    ${colorPicker(h.color)}
    ${existing?'<button class="btn danger block sm" id="h-del" style="margin-bottom:10px">Delete habit</button>':''}
    <button class="btn block" id="h-save">${existing?'Save':'Create habit'}</button>
  `,r=>{
    bindColors(r);
    $('[data-icons]',r).addEventListener('click',e=>{const b=e.target.closest('button[data-ic]');if(b){$$('[data-icons] button',r).forEach(x=>x.classList.remove('on'));b.classList.add('on');}});
    $('#h-freq',r).addEventListener('change',e=>{$('#days-field',r).style.display=e.target.value==='daily'?'none':'';});
    $('[data-days]',r).addEventListener('click',e=>{const b=e.target.closest('[data-day]');if(b)b.classList.toggle('on');});
    if(existing)$('#h-del',r).onclick=()=>{if(confirm('Delete habit?')){S.habits=S.habits.filter(x=>x.id!==h.id);save('habits');closeSheet();renderHabits();}};
    $('#h-save',r).onclick=()=>{
      const name=$('#h-name',r).value.trim(); if(!name){toast('Name required');return;}
      const freq=$('#h-freq',r).value;
      const days=$$('[data-days] .on',r).map(b=>+b.dataset.day);
      const icon=($('[data-icons] button.on',r)||{}).dataset?.ic||HABIT_ICONS[0];
      const obj={id:h.id||uid(),name,icon,frequency:freq,days:freq==='daily'?[]:days,category:$('#h-cat',r).value,color:pickedColor(r),logs:h.logs||[]};
      if(existing){const i=S.habits.findIndex(x=>x.id===h.id);S.habits[i]=obj;}else S.habits.push(obj);
      save('habits');closeSheet();renderHabits();toast('Saved');
    };
  });
}

    <div class="field"><label>Name</label><input id="b-name" placeholder="e.g. Morning workout"></div>
    <div class="field-2"><div class="field"><label>Start</label><input id="b-start" type="time" value="07:00"></div>
      <div class="field"><label>End</label><input id="b-end" type="time" value="08:00"></div></div>
    <div class="field"><label>Category</label><select id="b-cat">${Object.keys(ROUTINE_CATS).map(c=>`<option>${c}</option>`).join('')}</select></div>
    <button class="btn block" id="b-save">Add block</button>`,r=>{
    $('#b-save',r).onclick=()=>{const n=$('#b-name',r).value.trim();if(!n)return;const cat=$('#b-cat',r).value;
      S.routine.push({id:uid(),name:n,startTime:$('#b-start',r).value,endTime:$('#b-end',r).value,category:cat,color:ROUTINE_CATS[cat],done:false});
      save('routine');closeSheet();renderMe();};
  });
}
function meSleep(c){
  const logs=[...S.sleep].sort((a,b)=>b.date.localeCompare(a.date));
  // weekly avg last 7
  const last7=logs.filter(l=>l.date>=daysAgo(6));
  const avg=last7.length?(last7.reduce((s,l)=>s+(+l.duration||0),0)/last7.length):0;
  // chart last 7 days
  const labels=[],vals=[];
  for(let i=6;i>=0;i--){const d=daysAgo(i);const l=S.sleep.find(x=>x.date===d);labels.push(DAYS[new Date(d+'T00:00:00').getDay()]);vals.push(l?+l.duration||0:0);}
  // sleep debt vs goal last 7
  const debt=last7.reduce((s,l)=>s+(S.user.sleepGoal-(+l.duration||0)),0);
  c.innerHTML=`<button class="btn block" id="add-sleep">+ Log sleep</button>
    <div class="grid2" style="margin-top:14px">
      <div class="card" style="margin:0"><h3>7-day avg</h3><div style="font-size:26px;font-weight:800">${avg.toFixed(1)}<span class="tiny muted"> hrs</span></div></div>
      <div class="card" style="margin:0"><h3>Sleep debt</h3><div style="font-size:26px;font-weight:800;color:${debt>0?'var(--red)':'var(--green)'}">${debt>0?'-':'+'}${Math.abs(debt).toFixed(1)}<span class="tiny muted"> hrs</span></div><div class="tiny muted">vs ${S.user.sleepGoal}h goal</div></div>
    </div>
    <div class="card"><h3>Last 7 nights</h3>${barChart(vals,labels,{h:120,color:'#bf5af2'})}</div>
    <div class="card"><h3>History</h3>
    ${logs.length? logs.map(l=>`<div class="list-row" data-sleep="${l.id}">
      <div style="flex:1"><div class="ttl">${l.duration}h · ${'★'.repeat(l.quality||0)}</div>
      <div class="tiny muted">${fmtDateY(l.date)} · ${l.bedtime}→${l.waketime}${l.notes?' · '+esc(l.notes):''}</div></div>
      <button class="icon-btn" data-del>🗑</button></div>`).join('')
      : '<div class="muted tiny">No sleep logged.</div>'}
    </div>`;
  $('#add-sleep',c).onclick=()=>sleepForm();
  $$('[data-sleep]',c).forEach(r=>$('[data-del]',r).onclick=()=>{S.sleep=S.sleep.filter(x=>x.id!==r.dataset.sleep);save('sleep');renderMe();});
}
function sleepForm(){
  let quality=4;
  openSheet('Log sleep',`
    <div class="field"><label>Date (wake day)</label><input id="s-date" type="date" value="${todayStr()}"></div>
    <div class="field-2"><div class="field"><label>Bedtime</label><input id="s-bed" type="time" value="23:00"></div>
      <div class="field"><label>Wake time</label><input id="s-wake" type="time" value="07:00"></div></div>
    <div class="field"><label>Quality</label><div class="stars" data-stars>${[1,2,3,4,5].map(n=>`<span data-n="${n}" class="${n<=quality?'on':''}">★</span>`).join('')}</div></div>
    <div class="field"><label>Notes</label><textarea id="s-notes" placeholder="Optional"></textarea></div>
    <button class="btn block" id="s-save">Save</button>`,r=>{
    $('[data-stars]',r).addEventListener('click',e=>{const s=e.target.closest('[data-n]');if(s){quality=+s.dataset.n;$$('[data-stars] span',r).forEach(x=>x.classList.toggle('on',+x.dataset.n<=quality));}});
    $('#s-save',r).onclick=()=>{const bed=$('#s-bed',r).value,wake=$('#s-wake',r).value;
      let dur=(parseInt(wake)*60+ +wake.split(':')[1]) - (parseInt(bed)*60+ +bed.split(':')[1]); if(dur<0)dur+=1440; dur=+(dur/60).toFixed(1);
      S.sleep.push({id:uid(),date:$('#s-date',r).value||todayStr(),bedtime:bed,waketime:wake,duration:dur,quality,notes:$('#s-notes',r).value.trim()});
      save('sleep');closeSheet();renderMe();toast('Logged');};
  });
}
function meJournal(c){
  const entries=[...S.journal].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  c.innerHTML=`<button class="btn block" id="add-j">+ New entry</button>
    <div class="field" style="margin-top:14px"><input id="j-search" placeholder="🔍 Search entries…"></div>
    <div id="j-list"></div>`;
  const renderList=(q='')=>{
    const f=entries.filter(e=>!q||e.text.toLowerCase().includes(q.toLowerCase())||e.date.includes(q));
    $('#j-list',c).innerHTML=f.length? f.map(e=>`<div class="card tap" data-j="${e.id}">
      <div class="row between" style="margin-bottom:4px"><span class="tiny muted">${fmtDateY(e.date)}</span><span>${e.mood||''}</span></div>
      <div class="ttl" style="font-weight:500">${esc(e.text.split('\n')[0].slice(0,80))}${e.text.length>80?'…':''}</div></div>`).join('')
      : (q?'<div class="muted tiny">No matches.</div>':emptyState('📓','No journal entries yet. Capture your thoughts.','Write entry',()=>journalForm()));
    $$('[data-j]',c).forEach(card=>card.onclick=()=>journalForm(S.journal.find(x=>x.id===card.dataset.j)));
  };
  renderList();
  $('#add-j',c).onclick=()=>journalForm();
  $('#j-search',c).addEventListener('input',e=>renderList(e.target.value));
}
function journalForm(existing){
  const e=existing||{};
  let mood=e.mood||'';
  const moods=['😄','🙂','😐','😕','😞','😤','😴','🥳'];
  openSheet(existing?'Edit entry':'New entry',`
    <div class="field"><label>Date</label><input id="j-date" type="date" value="${e.date||todayStr()}"></div>
    <div class="field"><label>Mood</label><div class="row wrap" data-moods>${moods.map(m=>`<button type="button" class="chip ${m===mood?'on':''}" data-m="${m}" style="font-size:18px">${m}</button>`).join('')}</div></div>
    <div class="field"><label>Entry</label><textarea id="j-text" style="min-height:160px" placeholder="What's on your mind?">${esc(e.text||'')}</textarea></div>
    ${existing?'<button class="btn danger block sm" id="j-del" style="margin-bottom:10px">Delete entry</button>':''}
    <button class="btn block" id="j-save">${existing?'Save':'Save entry'}</button>`,r=>{
    $('[data-moods]',r).addEventListener('click',ev=>{const b=ev.target.closest('[data-m]');if(b){mood=b.dataset.m;$$('[data-moods] .chip',r).forEach(x=>x.classList.toggle('on',x.dataset.m===mood));}});
    if(existing)$('#j-del',r).onclick=()=>{if(confirm('Delete entry?')){S.journal=S.journal.filter(x=>x.id!==e.id);save('journal');closeSheet();renderMe();}};
    $('#j-save',r).onclick=()=>{const text=$('#j-text',r).value.trim();if(!text){toast('Write something');return;}
      if(existing){e.text=text;e.mood=mood;e.date=$('#j-date',r).value;}
      else S.journal.push({id:uid(),date:$('#j-date',r).value||todayStr(),text,mood});
      save('journal');closeSheet();renderMe();toast('Saved');};
  });
}
function meSettings(c){
  const u=S.user;
  c.innerHTML=`
    <div class="card"><h3>Profile</h3>
      <div class="field"><label>Your name</label><input id="set-name" value="${esc(u.name||'')}"></div>
      <div class="field"><label>Weight unit</label><select id="set-unit"><option value="kg" ${u.weightUnit==='kg'?'selected':''}>Kilograms (kg)</option><option value="lb" ${u.weightUnit==='lb'?'selected':''}>Pounds (lb)</option></select></div>
      <div class="field-2"><div class="field"><label>Sleep goal (hrs)</label><input id="set-sleep" type="number" inputmode="decimal" step="0.5" value="${u.sleepGoal}"></div>
        <div class="field"><label>Water goal (glasses)</label><input id="set-water" type="number" inputmode="numeric" value="${u.waterGoal}"></div></div>
      <button class="btn block" id="set-save">Save settings</button>
    </div>
    <div class="card"><h3>Data</h3>
      <button class="btn block secondary" id="export" style="margin-bottom:10px">⬇️ Export all data (JSON)</button>
      <button class="btn block secondary" id="import-btn" style="margin-bottom:10px">⬆️ Import from backup</button>
      <input type="file" id="import-file" accept="application/json" style="display:none">
      <button class="btn block danger" id="clear">🗑 Clear all data</button>
    </div>
    <div class="tiny muted" style="text-align:center;margin-top:8px">Trove · all data stored locally on this device</div>`;
  $('#set-save',c).onclick=()=>{u.name=$('#set-name',c).value.trim()||'there';u.weightUnit=$('#set-unit',c).value;u.sleepGoal=+$('#set-sleep',c).value||8;u.waterGoal=+$('#set-water',c).value||8;save('user');toast('Settings saved');renderMe();};
  $('#export',c).onclick=exportData;
  $('#import-btn',c).onclick=()=>$('#import-file',c).click();
  $('#import-file',c).addEventListener('change',importData);
  $('#clear',c).onclick=()=>{ if(confirm('Delete ALL Trove data? This cannot be undone.')&&confirm('Are you absolutely sure?')){ KEYS.forEach(k=>localStorage.removeItem('trove_'+k)); KEYS.forEach(k=>S[k]=JSON.parse(JSON.stringify(DEFAULTS[k]))); toast('All data cleared'); renderMe(); } };
}
function exportData(){
  const data={};KEYS.forEach(k=>data[k]=S[k]); data._exported=new Date().toISOString();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='trove-backup-'+todayStr()+'.json'; a.click(); URL.revokeObjectURL(a.href);
  toast('Exported');
}
function importData(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{ try{ const d=JSON.parse(reader.result);
    KEYS.forEach(k=>{ if(d[k]!==undefined){ S[k]=d[k]; save(k); } });
    toast('Imported'); renderMe();
  }catch(err){ toast('Invalid backup file'); } };
  reader.readAsText(file);
}

/* ============================================================
   QUICK ADD (FAB)
   ============================================================ */
$('#fab').onclick=()=>{
  openSheet('Quick add',`
    <div class="grid2">
      ${[['💧','Water','water'],['😊','Mood','mood'],['💪','Workout','workout'],['📓','Journal','journal'],['😴','Sleep','sleep'],['⚖️','Weigh-in','metric']].map(([ic,l,a])=>
        `<button class="card tap" data-qa="${a}" style="margin:0;text-align:center;padding:20px 0"><div style="font-size:30px">${ic}</div><div class="ttl" style="margin-top:6px">${l}</div></button>`).join('')}
    </div>`,r=>{
    $$('[data-qa]',r).forEach(b=>b.onclick=()=>{
      const a=b.dataset.qa; closeSheet();
      if(a==='water'){const rec=dayRec();rec.water++;save('daily');toast('+1 glass 💧');if(activeTab==='today')renderToday();}
      else if(a==='mood'){switchTab('today');setTimeout(()=>document.querySelector('[data-mood]')?.scrollIntoView({behavior:'smooth',block:'center'}),100);}
      else if(a==='workout'){setTimeout(workoutForm,250);}
      else if(a==='journal'){setTimeout(()=>journalForm(),250);}
      else if(a==='sleep'){setTimeout(sleepForm,250);}
      else if(a==='metric'){setTimeout(metricForm,250);}
    });
  });
};

/* ============================================================
   INIT
   ============================================================ */
renderToday();

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
// add-to-home-screen prompt (Android/desktop; iOS uses Share sheet)
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferredPrompt=e; });
</script>
